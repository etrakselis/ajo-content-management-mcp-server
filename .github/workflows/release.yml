name: Publish image

# Builds the multi-arch container image and pushes it to the GitHub Container
# Registry (GHCR) so end users can pull-and-run instead of cloning and building.
#
# Triggers:
#   - pushing a version tag (e.g. v1.2.3) publishes :1.2.3, :1.2, and :latest
#   - manual run (workflow_dispatch) publishes :latest (handy for a quick rebuild)
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  # Image name is lowercase as required by GHCR. Resolves to
  # ghcr.io/<owner>/ajo-content-mcp.
  IMAGE: ghcr.io/${{ github.repository_owner }}/ajo-content-mcp

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & push (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3   # enables arm64 emulation on amd64 runner

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
          # Links the published package to this repo and shows up in the GHCR UI.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=AJO Content MCP Server

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
