name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  compose-drift:
    name: Distribution bundle in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The bundle's docker-compose.yml is a deliberate standalone copy (different
      # comments, no repo dependencies), so a byte diff would be noise. Instead we
      # compare the *effective* config that `docker compose config` renders, with
      # project-name/path-derived fields normalized away. Any real difference —
      # image tag, ports, env, volumes, security options — fails the check.
      - name: Compare effective compose config
        run: |
          normalize() {
            local f="$1" dir base
            dir="$(dirname "$(realpath "$f")")"
            base="$(basename "$dir")"
            docker compose -f "$f" config 2>/dev/null \
              | grep -v '^name:' \
              | sed "s#${dir}#<DIR>#g" \
              | sed "s#${base}_default#<PROJ>_default#g"
          }
          if ! diff <(normalize docker-compose.yml) <(normalize distribution/docker-compose.yml); then
            echo "::error file=distribution/docker-compose.yml::Bundle has drifted from the root docker-compose.yml (effective config differs). Sync the two files."
            exit 1
          fi
          echo "distribution/docker-compose.yml is in sync with docker-compose.yml."
