version: '3.8'

services:
  ajo-content-mcp:
    # Pull the pre-built, multi-arch image from GHCR — no local build needed.
    # Pin a specific version (e.g. :1.0.0) for reproducibility, or use :latest.
    # Contributors building from source instead: see docker-compose.build.yml.
    image: ghcr.io/etrakselis/ajo-content-mcp:latest
    # Re-check the registry on every `docker compose up` and pull a newer image if the
    # published :latest changed — so you always run the most up-to-date build without a
    # separate `docker compose pull`. Requires network access at start-up. (If you pin a
    # version tag above, this just re-verifies that exact image; to freeze on the cached
    # image, set this to `missing` or run `docker compose up -d --pull never`.)
    pull_policy: always
    container_name: ajo-content-mcp
    ports:
      # Publish to the host's loopback only — never expose to the LAN. The app has
      # no caller authentication, so reachability is the security boundary.
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Bind all interfaces *inside the container's isolated network namespace* so
      # the published port above can reach it; host-side loopback binding (above)
      # is what actually limits exposure.
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      # Where the content-change audit trail (JSONL) is written. Points at the
      # writable volume below so it survives restarts and lands on the host,
      # where it can be committed to a (private) repo.
      - AUDIT_LOG_PATH=/audit/audit-log.jsonl
      # Optional: trim the advertised tool surface for context-constrained clients by
      # collapsing the 5 reference get_* tools into one get_reference tool (see README).
      # Uncomment to enable; leave unset for the full, maximally-discoverable surface.
      # - MCP_LEAN_MODE=1
    volumes:
      # Bind-mount a host directory for the audit log. Writable even though the
      # container rootfs is read-only (volumes override the read-only mount).
      - ./audit:/audit
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
